<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MCQ Supermarket — Operations</title>
  <meta name="description" content="MCQ International supermarket — checklists, operations, staff & HR, compliance and analytics.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/styles2.css">
  <link rel="icon" type="image/png" href="assets/mcq-logo-exact.png">
</head>
<body class="role-ho">
  <!-- Boot splash (removed once login/app renders) -->
  <div id="boot-splash" style="position:fixed;inset:0;z-index:200;display:grid;place-items:center;background:linear-gradient(150deg,#06402e 0%,#0a6b54 40%,#0b7d8f 75%,#163e83 100%)">
    <div style="text-align:center">
      <img src="assets/mcq-logo-exact.png" alt="MCQ Supermarket" style="height:96px;filter:drop-shadow(0 12px 26px rgba(0,0,0,.3))">
      <div style="margin-top:16px;color:#fff;font-family:Inter,sans-serif;font-weight:700;opacity:.92;letter-spacing:.02em">Loading…</div>
    </div>
  </div>
  <!-- LOGIN (shown when signed out) -->
  <div id="login-root" class="login-root"></div>

  <!-- APP -->
  <div class="app" id="app" style="display:none">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="mcq-logo dark"><img src="assets/mcq-logo-exact.png" alt="MCQ Supermarket logo"></span>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="side-foot"><div class="scope-pill"><span class="dot"></span> Live · synced now</div></div>
    </aside>
    <div class="main">
      <header class="topbar">
        <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <div class="crumbs" id="crumbs"></div>
        <div class="top-spacer"></div>
        <div class="topbar-right" id="topbar-right"></div>
      </header>
      <main class="content" id="content"></main>
    </div>
  </div>

  <div id="sb-backdrop" onclick="closeSidebarM()"></div>
  <div class="drawer-mask" id="drawer-mask" onclick="closeDrawer()"></div>
  <aside class="drawer" id="drawer"></aside>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="assets/data.js"></script>
  <script src="assets/hr-data.js"></script>
  <script src="assets/pages.js"></script>
  <script src="assets/pages2.js"></script>
  <script src="assets/firebase.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
