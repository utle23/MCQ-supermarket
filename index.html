<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MCQ Supermarket — Operations</title>
  <meta name="description" content="MCQ International supermarket — checklists, operations, staff & HR, compliance and analytics.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css?v=20260707-157">
  <link rel="stylesheet" href="assets/styles2.css?v=20260707-157">
  <link rel="icon" type="image/png" href="assets/mcq-logo-exact.png">
  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0e9f6e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MCQ Ops">
  <link rel="apple-touch-icon" href="assets/mcq-logo-exact.png">
</head>
<body class="role-ho">
  <!-- Boot splash (removed once login/app renders) -->
  <div id="boot-splash" style="position:fixed;inset:0;z-index:200;display:grid;place-items:center;background:linear-gradient(150deg,#06402e 0%,#0a6b54 40%,#0b7d8f 75%,#163e83 100%)">
    <div style="text-align:center">
      <img src="assets/mcq-logo-exact.png" alt="MCQ Supermarket" style="height:96px;filter:drop-shadow(0 12px 26px rgba(0,0,0,.3))">
      <div id="boot-text" style="margin-top:16px;color:#fff;font-family:Inter,sans-serif;font-weight:700;opacity:.92;letter-spacing:.02em">Loading…</div>
      <div id="boot-sub" style="margin-top:6px;color:rgba(255,255,255,.78);font-family:Inter,sans-serif;font-size:12px;font-weight:600"></div>
    </div>
  </div>
  <!-- LOGIN (shown when signed out) -->
  <div id="login-root" class="login-root"></div>

  <!-- APP -->
  <div class="app" id="app" style="display:none">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="mcq-logo dark"><img src="assets/mcq-logo-exact.png" alt="MCQ Supermarket logo"></span>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="side-foot"><div class="scope-pill" id="side-sync"><span class="dot warn"></span> Loading data...</div></div>
    </aside>
    <div class="main">
      <header class="topbar">
        <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <div class="crumbs" id="crumbs"></div>
        <div class="top-spacer"></div>
        <div class="topbar-right" id="topbar-right"></div>
      </header>
      <div id="store-scope-bar"></div>
      <main class="content" id="content"></main>
    </div>
  </div>

  <div id="sb-backdrop" onclick="closeSidebarM()"></div>
  <div class="drawer-mask" id="drawer-mask" onclick="closeDrawer()"></div>
  <aside class="drawer" id="drawer"></aside>

  <!-- Chart.js, jsPDF, pages2.js (HR registers) and ai.js (AI Lab) are loaded ON DEMAND
       by assets/app.js for a fast login — see ensureChart / ensureJsPDF / ensureLazyModules. -->
  <script src="assets/data.js?v=20260707-157"></script>
  <script src="assets/hr-data.js?v=20260707-157"></script>
  <script src="assets/pages.js?v=20260707-157"></script>
  <script src="assets/firebase.js?v=20260707-157"></script>
  <script src="assets/api.js?v=20260707-157"></script>
  <script src="assets/app.js?v=20260707-157"></script>
  <script src="assets/faceid.js?v=20260707-157"></script>
  <script src="assets/i18n.js?v=20260707-157"></script>
  <!-- PWA: install + offline -->
  <button id="pwa-install" style="display:none;position:fixed;right:16px;bottom:16px;z-index:150;border:0;border-radius:24px;padding:11px 18px;font-weight:800;font-family:inherit;font-size:13px;color:#fff;background:linear-gradient(135deg,#0e9f6e,#0891b2);box-shadow:0 10px 24px rgba(14,159,110,.4);cursor:pointer">⬇️ Install app</button>
  <script>
    (function(){
      if('serviceWorker' in navigator){
        if(navigator.serviceWorker.controller){
          navigator.serviceWorker.addEventListener('controllerchange',function(){ if(!window.__swReloaded){ window.__swReloaded=true; location.reload(); } });
        }
        window.addEventListener('load',function(){ navigator.serviceWorker.register('sw.js').then(function(reg){
          try{ reg.update(); }catch(e){}
          // check for a new deploy every 60s so OPEN tabs pick up changes automatically (~1 min),
          // not just on manual reload — the SW skipWaiting/clients.claim then reloads once.
          setInterval(function(){ try{ reg.update(); }catch(e){} }, 60000);
          // also re-check the moment the device/tab comes back to the foreground
          document.addEventListener('visibilitychange',function(){ if(!document.hidden){ try{ reg.update(); }catch(e){} } });
        }).catch(function(){}); });
      }
      var deferred=null, btn=document.getElementById('pwa-install');
      window.addEventListener('beforeinstallprompt',function(e){ e.preventDefault(); deferred=e; if(btn) btn.style.display='block'; });
      if(btn) btn.addEventListener('click',function(){ if(!deferred) return; deferred.prompt(); deferred.userChoice.finally(function(){ deferred=null; btn.style.display='none'; }); });
      window.addEventListener('appinstalled',function(){ if(btn) btn.style.display='none'; });
    })();
  </script>
</body>
</html>
